services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: umbra
      POSTGRES_PASSWORD: umbra
      POSTGRES_DB: umbra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  umbra-server:
    build:
      context: .
      dockerfile: crates/umbra-server/Dockerfile
    depends_on:
      - postgres
    environment:
      UMBRA_DATABASE_URL: postgres://umbra:umbra@postgres:5432/umbra
      UMBRA_PUBLIC_URL: http://localhost:8080
      UMBRA_AUTO_MIGRATE: "false"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
