services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: umbra
      POSTGRES_PASSWORD: umbra
      POSTGRES_DB: umbra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/001-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umbra -d umbra"]
      interval: 5s
      timeout: 5s
      retries: 10

  umbra-server:
    build:
      context: .
      dockerfile: crates/umbra-server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      UMBRA__DATABASE__URL: postgres://umbra:umbra@postgres:5432/umbra
      UMBRA__SERVER__PUBLIC_URL: http://localhost:8080
      UMBRA__MIGRATIONS__AUTO_MIGRATE: "false"
      UMBRA__AUTH__OPAQUE__ALLOW_EPHEMERAL_SETUP: "true"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
